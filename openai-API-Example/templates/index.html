<!DOCTYPE html>
<html>
    <head>
        <title>
            Example ChatGPT
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>

        <script src="/resources/js/audiorecording.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js" integrity="sha512-uMtXmF28A2Ab/JJO2t/vYhlaa/3ahUOgj1Zf27M5rOo8/+fcTUVH0/E0ll68njmjrLqOBjXM3V9NiPFL5ywWPQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    </head>
    <body class="m-0 row justify-content-center">
       <div class="container bg-primary text-white">
                <div class="d-flex flex-row justify-content-center">
                   <div>
		       <img src="https://www.uagrm.edu.bo/img/uagrm-escudo.png" width="65px" height="75px" />
		   </div>
		   <div class="p-3">
		       <h1>Bienvenidos al Chatbot de la Universidad</h1>
		   </div>
		 </div>
	     </div>
	     <div class="p-3">
	         <button class="btn btn-primary" id="btnStart">Grabar</button>
                 <button class="btn btn-danger" id="btnStop">Parar grabación</button>
	     </div>
	</div>
        <div class="container" >
             
            <div >
                
                <audio id="audioPlay">Reproducir</audio>
                <audio id="audio"></audio>
                <p id="textTranscription" style="width: 80%; padding: 10px; border-style: solid; border-width: 3px; border-radius: 5px; border-color: #bbb; font-weight: bold; color: #009;"> 
                </p>
                <p id="textChat" style="width: 80%; padding: 10px; border-style: solid; border-width: 3px; border-radius: 5px; border-color: #bbb;"> 
                </p>
            </div>
            <div class="m-0 row justify-content-center">
                <div class="col-auto p-5">
                    <div id="grabar" class="spinner-grow text-danger" role="status">
                        <span class="visually-hidden">Cargando...</span>
                    </div>
                    
                </div>
            </div>
            <div class="m-0 row justify-content-center">
                
                <div class="col-auto p-5">
                    <div id="cargando" class="spinner-border spinner-border-sm" role="status">
                        <span class="visually-hidden">Cargando...</span>
                      </div>
                    
                </div>
                
            </div>
            
        </div>
        
        
    </body>
</html>
